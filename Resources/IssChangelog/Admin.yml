Name: Admin
Order: 3
AdminOnly: true
Entries:
- author: issyman182
  version: iss14:1.7.0
  time: '2026-07-08'
  changes:
  - message: New Auto Restart panel (autorestartconfig, Host flag) — schedule a daily automatic server restart at a set time (e.g. 3 AM). Shows the live server clock and a countdown; the restart happens gracefully at round end with chat warnings.
    type: Add
  - message: New Round End Ad panel (adconfig, Admin flag) — configure a chat advertisement broadcast at every round end (e.g. a Discord invite). Supports multi-line messages via Enter or literal "\n".
    type: Add
  - message: New Server Performance panel (serverperf) — live tick time graphs and server health metrics, also exported as iss14_* Prometheus gauges.
    type: Add
  - message: New Connections panel (connquality) — per-player ping and connection quality overview.
    type: Add
  - message: New Entity Census panel (entitycensus) — entity counts and growth over the round.
    type: Add
  - message: New server.rounds_before_restart CVar — gracefully restart the server after N completed rounds.
    type: Add
  - message: The reporter news Discord relay is configured via discord.news_channel_id in server_config.toml (uses the Discord bot, no webhook needed).
    type: Add
  id: 10
- author: issyman182
  version: iss14:1.6.1
  time: '2026-06-30'
  changes:
  - message: The Combat Stats panel now keeps a per-round history — browse kills, damage and deaths for previous rounds, not just the current one.
    type: Add
  - message: The admin menu (F7) now opens for any staff rank that holds at least one permission, showing only the tools that rank is allowed to use (previously required the full Admin flag).
    type: Tweak
  - message: The role time requirement editor, voting config and New Life config panels now require the Server flag (moved off Admin). User-data migrations need the Moderator flag, and transferring admin permissions specifically now requires the Permissions flag.
    type: Tweak
  id: 9
- author: issyman182
  version: iss14:1.6.0
  time: '2026-06-28'
  changes:
  - message: New ttsconfig panel — configure the Text-To-Speech backend, default voice, test playback, and per-voice gender assignments.
    type: Add
  - message: New playerrecords panel — browse every player who has ever connected (GUID, username, first/last seen, IP, playtime, ban count, migration status).
    type: Add
  - message: New migrations panel plus automatic account migration — when a player re-registers the same username and is issued a new GUID, their play times, prefs, whitelists and bans can be moved to the new account (auto on HWID/IP match, manual review otherwise). Admin status is never moved automatically.
    type: Add
  id: 8
- author: issyman182
  version: iss14:1.5.0
  time: '2026-06-24'
  changes:
  - message: The Combat Stats panel now opens with the Logs flag (previously required full Admin).
    type: Tweak
  - message: The Role Times panel (view and edit) now opens with the Moderator flag (previously required full Admin).
    type: Tweak
  id: 7
- author: issyman182
  version: iss14:1.4.0
  time: '2026-06-22'
  changes:
  - message: New Life can be enabled or disabled.
    type: Add
  - message: The New Life respawn delay can be configured.
    type: Add
  id: 6
- author: issyman182
  version: iss14:1.3.0
  time: '2026-06-20'
  changes:
  - message: Admin logs are now colored.
    type: Add
  - message: New Combat Stats window (kill / damage logs).
    type: Add
  - message: Added a configurable round preload time.
    type: Add
  - message: Fixed the client-side role requirement display.
    type: Fix
  id: 5
- author: issyman182
  version: iss14:1.2.2
  time: '2026-06-17'
  changes:
  - message: Fixed the permissions for the vote config, role times and role time requirement panels.
    type: Fix
  id: 4
- author: issyman182
  version: iss14:1.2.1
  time: '2026-06-17'
  changes:
  - message: The release version is now written into server_config.toml on deploy.
    type: Tweak
  id: 3
- author: issyman182
  version: iss14:1.2.0
  time: '2026-06-17'
  changes:
  - message: New voting config menu — toggle individual votes and manage map/gamemode pools.
    type: Add
  - message: Role time requirements editor — change job playtime requirements in-game.
    type: Add
  - message: Added new commands to the admin menu.
    type: Add
  id: 2
- author: issyman182
  version: iss14:1.0.1
  time: '2026-06-14'
  changes:
  - message: New Role Times admin panel and command for viewing player role playtimes.
    type: Add
  id: 1
