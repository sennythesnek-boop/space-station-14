Name: Changelog
Order: 0
Entries:
- author: issyman182
  version: iss14:1.7.0
  time: '2026-07-08'
  changes:
  - message: Surgery! Bodies are now made of real parts and organs (Shitmed port). Perform surgery at operating tables — amputate and reattach limbs, transplant organs, install implants and augments — and target individual body parts with the new targeting doll. Includes the Autodoc for automated procedures.
    type: Add
  - message: Grabbing and martial arts (ported from Goobstation). Grab people with escalating grip strength, shove them around or throw them, and fight with martial arts techniques.
    type: Add
  - message: News articles published by station reporters are now posted to our Discord server as soon as they go out.
    type: Add
  - message: Fixed cyborg module items (like the medical borg's beakers) permanently disappearing.
    type: Fix
  - message: Fixed spider venom never regenerating.
    type: Fix
  - message: Fixed broken species pages in the guidebook.
    type: Fix
  id: 11
- author: issyman182
  version: iss14:1.6.1
  time: '2026-06-30'
  changes:
  - message: Executions with guns — ready a firearm against someone's head for a point-blank kill, or turn it on yourself.
    type: Add
  - message: Cryo pods now treat the dead. Cryoxadone and Doxarubixadone keep working on a dead patient, so a body left in a cryo pod can be healed back to revivable.
    type: Tweak
  - message: Fixed Text-To-Speech voices overlapping and talking over each other.
    type: Fix
  id: 10
- author: issyman182
  version: iss14:1.6.0
  time: '2026-06-28'
  changes:
  - message: Text-To-Speech! Characters can now speak out loud — either Sims-style gibberish blips or real neural voices (when the server has a voice backend set up). Pick your character's gibberish voice in the character editor and tune everything in Options -> Audio.
    type: Add
  - message: New trait — Deaf. You hear no local speech, whispers or radio (including your own voice).
    type: Add
  - message: New trait — Hard of Hearing. Nearby speech is clear, mid-range speech is garbled, and far-away speech is silent.
    type: Add
  - message: Fixed disposals breaking when used normally.
    type: Fix
  id: 9
- author: issyman182
  version: iss14:1.5.0
  time: '2026-06-24'
  changes:
  - message: Sprint! Press or hold Space to sprint, drawing from your stamina pool (ported from Goobstation).
    type: Add
  - message: Added a search box to the keybinds options menu to quickly find a binding.
    type: Add
  - message: Added the ISS changelog and an in-client fork version display.
    type: Add
  - message: The Power Grid Check event now fires less often and the blackout is shorter.
    type: Tweak
  - message: Disposals are now much harder to escape from.
    type: Tweak
  id: 8
- author: issyman182
  version: iss14:1.4.0
  time: '2026-06-22'
  changes:
  - message: New cyborg brain — the AI vassal core. The Station AI can take control of a cyborg that has an AI vassal core as its brain.
    type: Add
  - message: The Station AI can now warp to players and stations.
    type: Add
  - message: New hoverboard, orderable from cargo in a hoverboard crate.
    type: Add
  - message: New Life / respawn, including new rules.
    type: Add
  id: 7
- author: issyman182
  version: iss14:1.3.0
  time: '2026-06-20'
  changes:
  - message: New ruleset — the in-game Server Rules guidebook was rewritten.
    type: Tweak
  - message: Both clients now work — players on PlaySS14 and the Steam version can join (the server validates logins against multiple auth servers).
    type: Add
  id: 6
- author: issyman182
  version: iss14:1.2.2
  time: '2026-06-17'
  changes:
  - message: Fixed map loading.
    type: Fix
  id: 5
