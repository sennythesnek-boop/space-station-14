  version: iss14:1.2.1
  time: '2026-06-17'
  changes:
  - message: The map vote now has a player-count filter checkbox.
    type: Add
  - message: Fixed voting.
    type: Fix
  id: 4
- author: issyman182
  version: iss14:1.2.0
  time: '2026-06-17'
  changes:
  - message: The author's job icon now shows before their name in radio/comms chat.
    type: Add
  id: 3
