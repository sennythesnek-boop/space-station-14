  version: iss14:1.2.1
  time: '2026-06-17'
  changes:
  - message: The map vote now has a player-count filter checkbox.
    type: Add
  - message: The release version is now written into server_config.toml on deploy.
    type: Tweak
  - message: Fixed voting.
    type: Fix
  id: 4
- author: issyman182
  version: iss14:1.2.0
