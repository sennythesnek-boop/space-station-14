# Unreleased — not part of a tagged release yet, so no version.
- author: issyman182
  time: '2026-06-24'
  changes:
  - message: Sprint! Press or hold Space to sprint, drawing from your stamina pool (ported from Goobstation).
    type: Add
  - message: Added a search box to the keybinds options menu to quickly find a binding.
    type: Add
  - message: Added this ISS changelog and an in-client fork version display.
    type: Add
  - message: The Power Grid Check event now fires less often and the blackout is shorter.
    type: Tweak
  - message: Disposals are now much harder to escape from.
    type: Tweak
  - message: The Combat Stats admin panel now opens with the Logs flag, and the Role Times panel with the Moderator flag.
    type: Tweak
  id: 8
- author: issyman182
  version: iss14:1.4.0
  time: '2026-06-22'
  changes:
  - message: New Life / respawn — ghosts can opt in to respawn, with a cooldown, a per-round cap and an event blocklist, plus an admin config window.
    type: Add
  - message: The Station AI can now warp its eye to players and warp points, and take control of AI-only cyborg shells.
    type: Add
  - message: New hoverboard, orderable from cargo in a hoverboard crate.
    type: Add
  id: 7
- author: issyman182
  version: iss14:1.3.0
  time: '2026-06-20'
  changes:
  - message: New Combat Stats admin panel.
    type: Add
  - message: Admin logs are now colored, and kill and damage logs were added.
    type: Add
  - message: Servers can now validate logins against multiple auth servers at once.
    type: Add
  - message: Added a configurable round preload time.
    type: Add
  - message: Rewrote the in-game Server Rules guidebook.
    type: Tweak
  - message: Fixed the client-side role requirement display.
    type: Fix
  id: 6
- author: issyman182
  version: iss14:1.2.2
  time: '2026-06-17'
  changes:
  - message: Fixed the permissions for the vote config, role times and role time requirement panels.
    type: Fix
  - message: Fixed map loading.
    type: Fix
  id: 5
