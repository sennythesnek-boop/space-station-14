# iss14: shared solution entity prototypes for organs ported from Goob-Station.
# The port used the legacy inline `SolutionContainerManager` format; iss14's engine
# uses the new solution system (`SolutionManager` + child solution entities), so the
# inline solutions are defined here once and referenced from the organ prototypes.

# Gas exchange solution used by all lungs (code expects the name "Lung").
- type: entity
  parent: Solution
  id: SolutionLungGas # TODO: Metabolize directly from gasses :(
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    id: Lung
    solution:
      maxVol: 100.0
      canReact: false

# Grindable "organ" solutions (Extractable grindableSolutionName: organ).
- type: entity
  parent: Solution
  id: SolutionOrgan
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    id: organ
    solution:
      maxVol: 10
      reagents:
      - ReagentId: Nutriment
        Quantity: 10

- type: entity
  parent: Solution
  id: SolutionOrganBrain
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    id: organ
    solution:
      maxVol: 15
      reagents:
      - ReagentId: Nutriment
        Quantity: 10
      - ReagentId: Cognizine
        Quantity: 5

- type: entity
  parent: Solution
  id: SolutionOrganSlime
  categories: [ HideSpawnMenu ]
  components:
