# iss14: abstract animal body bases. These ids were introduced by upstream's Nubody refactor and are
# referenced throughout the NPC prototypes; re-implemented here on top of the part-based (Shitmed)
# body prototypes copied from Goob-Station.
- type: entity
  id: BaseMobAnimal
  abstract: true
  components:
  - type: Body # Shitmed: part-based body
    prototype: Animal

