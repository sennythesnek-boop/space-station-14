# iss14: vulpkanin body parts restored for the part-based (Shitmed) body system.
- type: entity
  id: PartVulpkanin
  parent: [BaseItem, BasePart]
  name: "vulpkanin body part"
  abstract: true
  components:
  - type: Icon # Shitmed Change
    sprite: Mobs/Species/Vulpkanin/parts.rsi
  - type: BodyPart # Shitmed Change
    species: Vulpkanin
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: ChestVulpkanin
  name: "vulpkanin chest"
  parent: [PartVulpkanin, BaseChest]
  components:
  - type: Sprite
    sprite: Mobs/Species/Vulpkanin/parts.rsi
    state: "torso_m"
  - type: Icon # iss14: vulpkanin parts.rsi has no chest_m state (BaseChest default), it uses torso_m
    sprite: Mobs/Species/Vulpkanin/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

- type: entity
  id: GroinVulpkanin
  name: "vulpkanin groin"
  parent: [PartVulpkanin, BaseGroin]
  components:
  - type: Sprite # vulpkanin parts.rsi has no separate groin state, reuse the human one
    sprite: Mobs/Species/Human/parts.rsi
    state: "groin_m"
  - type: Icon # iss14: same as Sprite - vulpkanin parts.rsi has no groin state
    sprite: Mobs/Species/Human/parts.rsi
    state: "groin_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

- type: entity
  id: HeadVulpkanin
  name: "vulpkanin head"
  parent: [PartVulpkanin, BaseHead]
  components:
  - type: Sprite
    sprite: Mobs/Species/Vulpkanin/parts.rsi
    state: "head"
  - type: Icon # iss14: vulpkanin parts.rsi has "head", not head_m (BaseHead default)
    sprite: Mobs/Species/Vulpkanin/parts.rsi
    state: "head"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 5
      - ReagentId: Blood
        Quantity: 10

