# Custom server ruleset for Issy's Space Station.
# The active ruleset is selected by the server.rules_file CVar (default: DefaultRuleset).
# DefaultRules.xml links to each of the rule pages below via textlinks.

- type: guideEntry # Default for forks and stuff. Should not be listed anywhere if the server is using a custom ruleset.
  id: DefaultRuleset
  name: guide-entry-rules
  ruleEntry: true
  priority: 10
  text: "/ServerInfo/Guidebook/ServerRules/DefaultRules.xml"

