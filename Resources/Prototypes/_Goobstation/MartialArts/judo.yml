- type: martialArt
  id: CorporateJudo
  martialArtsForm: CorporateJudo
  roundstartCombos: CorporateJudoMoves
  baseDamageModifier: 5

- type: comboList
  id: CorporateJudoMoves
  combos:
  - JudoThrow
  - JudoArmbar
  - JudoDiscombobulate # Due to supercode this needs to be below Armbar, otherwise it takes priority
  - JudoWheelThrow
  - JudoEyePoke # Same here, must be below WheelThrow
  #- JudoGoldenBlast

- type: combo
  id: JudoDiscombobulate
  name: Discombobulate
  martialArtsForm: CorporateJudo
  attacks:
  - Disarm
  - Grab
  event: !type:JudoDiscombobulatePerformedEvent

- type: combo
  id: JudoEyePoke
  name: Eye Poke
  martialArtsForm: CorporateJudo
  attacks:
  - Disarm
  - Harm
  event: !type:JudoEyePokePerformedEvent
  extraDamage: 5

- type: combo
  id: JudoThrow
  name: Judo Throw
  martialArtsForm: CorporateJudo
  attacks:
  - Grab
  - Disarm
  event: !type:JudoThrowPerformedEvent
  paralyzeTime: 4
  staminaDamage: 5
  dropItems: false
  canDoWhileProne: false

- type: combo
  id: JudoArmbar
  name: Armbar
  martialArtsForm: CorporateJudo
  attacks:
  - Disarm
  - Disarm
  - Grab
  event: !type:JudoArmbarPerformedEvent
  paralyzeTime: 5
  staminaDamage: 10
  dropItems: true

- type: combo
  id: JudoWheelThrow
  name: Wheel Throw
  martialArtsForm: CorporateJudo
  attacks:
  - Grab
  - Disarm
  - Harm
  event: !type:JudoWheelThrowPerformedEvent
  staminaDamage: 120

