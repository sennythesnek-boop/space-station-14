# iss14: Shitmed surgery cyborg modules ported from Goob-Station
# (Resources/Prototypes/Entities/Objects/Specific/Robotics/borg_modules.yml).
# Adapted to the newer ItemBorgModule schema (hands instead of items);
# Goob's DroppableBorgModule component is not ported.

- type: entity
  id: BorgModuleSurgery
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: surgery cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-surgery
  - type: ItemBorgModule
    hands:
    - item: Scalpel
    - item: SawElectric
    - item: Drill
    - item: Retractor
    - item: Hemostat
    - item: Cautery
    - item: MedicalStitches
    - item: BoneGel
    - item: Bonesetter
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: surgery-module }

- type: entity
  id: BorgModuleAdvancedSurgery
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: advanced surgery cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-advanced-surgery
  - type: ItemBorgModule
    hands:
    - item: EnergyScalpel
    - item: EnergyCautery
    - item: AdvancedRetractor
    - item: AdvancedBoneGel
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: adv-surgery-module }
